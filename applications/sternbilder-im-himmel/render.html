<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="paperless:epd-optimize" content='{"intent":"vivid"}'>
    <title>Sternbilder im Himmel</title>
    <link rel="stylesheet" href="/assets/paperless.css">
    <script src="/assets/paperless.iife.js"></script>
    <style>
      .stars-screen {
        padding: 0;
        gap: 0;
      }

      .stars-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 226px;
        border: 4px solid currentColor;
      }

      .sky-stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #111;
        color: #fff;
      }

      .sky-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, transparent 0 37%, rgba(247, 207, 40, 0.18) 38% 45%, transparent 46% 100%),
          radial-gradient(circle at 74% 20%, rgba(232, 61, 53, 0.22), transparent 26%),
          #111;
      }

      .sky-stage.no-milky-way::before {
        background:
          radial-gradient(circle at 74% 20%, rgba(232, 61, 53, 0.18), transparent 25%),
          #111;
      }

      .sky-map {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: block;
      }

      .horizon {
        fill: none;
        stroke: #f7cf28;
        stroke-width: 0.65;
        stroke-dasharray: 2 2;
        opacity: 0.72;
      }

      .grid-line {
        fill: none;
        stroke: #fff;
        stroke-width: 0.18;
        opacity: 0.24;
      }

      .background-star {
        fill: #fff;
      }

      .constellation-line {
        stroke: #fff;
        stroke-width: 0.55;
        stroke-linecap: round;
        opacity: 0.74;
      }

      .constellation-star {
        fill: #fff;
        stroke: #111;
        stroke-width: 0.2;
      }

      .constellation-label {
        fill: #fff;
        paint-order: stroke;
        stroke: #111;
        stroke-width: 0.85;
        font-size: 3.1px;
        font-weight: 900;
        letter-spacing: 0;
        text-anchor: middle;
        text-transform: uppercase;
      }

      .constellation.is-highlight .constellation-line {
        stroke: #f7cf28;
        stroke-width: 1.05;
        opacity: 1;
      }

      .constellation.is-highlight .constellation-star {
        fill: #f7cf28;
        stroke: #111;
        stroke-width: 0.28;
      }

      .constellation.is-red .constellation-line,
      .constellation.is-red.is-highlight .constellation-line {
        stroke: #e83d35;
      }

      .constellation.is-red.is-highlight .constellation-star {
        fill: #e83d35;
      }

      .constellation.is-blue .constellation-line,
      .constellation.is-blue.is-highlight .constellation-line {
        stroke: #5eb3ff;
      }

      .constellation.is-blue.is-highlight .constellation-star {
        fill: #5eb3ff;
      }

      .constellation.is-highlight .constellation-label {
        fill: #f7cf28;
      }

      .constellation.is-red.is-highlight .constellation-label {
        fill: #e83d35;
      }

      .constellation.is-blue.is-highlight .constellation-label {
        fill: #5eb3ff;
      }

      .stars-panel {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        padding: 18px 16px 14px;
        border-left: 4px solid currentColor;
        background: var(--pp-card);
        overflow: hidden;
      }

      .kicker,
      .meta,
      .fact-label,
      .legend-text,
      .api-label {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.78rem;
        line-height: 1.05;
        font-weight: 850;
        text-transform: uppercase;
      }

      .stars-title {
        margin: 6px 0 0;
        color: var(--pp-accent);
        font-size: 2.35rem;
        line-height: 0.9;
        font-weight: 950;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .stars-subtitle {
        margin: 8px 0 0;
        font-size: 1rem;
        line-height: 1.12;
        font-weight: 800;
      }

      .highlight-block {
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 9px;
        padding: 14px 0;
        border-top: 3px solid currentColor;
        border-bottom: 3px solid currentColor;
      }

      .highlight-name {
        margin: 0;
        font-size: 1.82rem;
        line-height: 0.98;
        font-weight: 940;
        overflow-wrap: anywhere;
      }

      .highlight-note {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.88rem;
        line-height: 1.16;
        font-weight: 720;
      }

      .fact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .fact {
        min-width: 0;
        padding: 9px;
        border: 2px solid currentColor;
      }

      .fact-value {
        margin: 4px 0 0;
        font-size: 1.05rem;
        line-height: 1.05;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .legend-mark {
        width: 22px;
        height: 8px;
        flex: 0 0 auto;
        background: #f7cf28;
        border: 2px solid currentColor;
      }

      .api-note {
        display: grid;
        gap: 3px;
      }

      .api-value {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.08;
        font-weight: 800;
      }

      @media (orientation: portrait), (max-width: 700px) {
        .stars-shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) auto;
        }

        .stars-panel {
          grid-template-rows: auto auto;
          grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
          gap: 10px 14px;
          padding: 14px;
          border-left: 0;
          border-top: 4px solid currentColor;
        }

        .highlight-block {
          padding: 0 0 0 12px;
          border-top: 0;
          border-bottom: 0;
          border-left: 3px solid currentColor;
        }

        .stars-title {
          font-size: 1.9rem;
        }

        .stars-subtitle {
          font-size: 0.9rem;
        }

        .highlight-name {
          font-size: 1.45rem;
        }

        .highlight-note {
          display: none;
        }

        .footer-stack {
          grid-column: 1 / -1;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          align-items: end;
        }
      }

      @media (max-width: 520px), (max-height: 520px) {
        .stars-shell {
          border-width: 3px;
        }

        .stars-panel {
          gap: 8px;
          padding: 10px;
        }

        .stars-title {
          font-size: 1.55rem;
        }

        .highlight-name {
          font-size: 1.22rem;
        }

        .fact {
          padding: 7px;
        }

        .fact-value {
          font-size: 0.92rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main class="pp-screen stars-screen" id="screen">
      <section class="stars-shell" id="shell">
        <div class="sky-stage" id="skyStage">
          <svg class="sky-map" id="skyMap" viewBox="0 0 100 100" role="img" aria-label="Constellation sky map"></svg>
        </div>
        <aside class="stars-panel">
          <header>
            <p class="kicker" id="kicker">Constellations</p>
            <h1 class="stars-title pp-fit" id="title">Sternbilder im Himmel</h1>
            <p class="stars-subtitle" id="subtitle">Loading sky map...</p>
          </header>
          <section class="highlight-block">
            <p class="fact-label" id="highlightLabel">Highlighted</p>
            <h2 class="highlight-name pp-fit" id="highlightName">-</h2>
            <p class="highlight-note" id="highlightNote"></p>
          </section>
          <footer class="footer-stack">
            <div class="fact-grid">
              <div class="fact">
                <p class="fact-label" id="seasonLabel">Season</p>
                <p class="fact-value" id="seasonValue">-</p>
              </div>
              <div class="fact">
                <p class="fact-label" id="hemisphereLabel">Sky</p>
                <p class="fact-value" id="hemisphereValue">-</p>
              </div>
            </div>
            <div class="api-note">
              <div class="legend">
                <span class="legend-mark"></span>
                <p class="legend-text" id="legendText">Highlight path</p>
              </div>
              <p class="api-label" id="apiLabel">API</p>
              <p class="api-value" id="apiValue">Built-in constellation catalogue</p>
            </div>
          </footer>
        </aside>
      </section>
    </main>
    <script>
      (async function render() {
        const {
          waitForPayload,
          getSettings,
          getQuerySettings,
          mergeSettings,
          loadLanguageJson,
          applyColorTheme,
          fitAllText,
          fitToScreen,
          escapeHtml,
          markReady,
          markError,
        } = window.PaperlessOpenIntegration;

        const defaults = {
          color: "dark",
          hemisphere: "north",
          season: "auto",
          highlight: "daily",
          showLabels: true,
          showMilkyWay: true,
          density: "balanced",
        };

        const seasonLabels = {
          spring: "Spring",
          summer: "Summer",
          autumn: "Autumn",
          winter: "Winter",
        };

        const hemisphereLabels = {
          north: "Northern",
          south: "Southern",
        };

        function message(messages, key, fallback) {
          return typeof messages[key] === "string" ? messages[key] : fallback;
        }

        function constellationLabel(messages, name) {
          const labels = messages.constellations && typeof messages.constellations === "object"
            ? messages.constellations
            : {};
          return typeof labels[name] === "string" ? labels[name] : name;
        }

        function localizedNote(messages, name, fallback) {
          const notes = messages.notes && typeof messages.notes === "object" ? messages.notes : {};
          return typeof notes[name] === "string" ? notes[name] : fallback;
        }

        function boolSetting(value) {
          return value === true || value === "true" || value === "1";
        }

        function svgNumber(value) {
          const number = Number(value);
          return Number.isFinite(number) ? number.toFixed(2).replace(/\.?0+$/, "") : "0";
        }

        function renderSky({ data, messages, showLabels, showMilkyWay }) {
          const skyStage = document.querySelector("#skyStage");
          const svg = document.querySelector("#skyMap");
          skyStage.classList.toggle("no-milky-way", !showMilkyWay);

          const background = data.backgroundStars
            .map((star) => (
              `<circle class="background-star" cx="${svgNumber(star.x)}" cy="${svgNumber(star.y)}" r="${svgNumber(star.size)}" opacity="${svgNumber(star.opacity)}"></circle>`
            ))
            .join("");

          const grid = `
            <ellipse class="horizon" cx="50" cy="51" rx="45" ry="36"></ellipse>
            <path class="grid-line" d="M9 51 H91"></path>
            <path class="grid-line" d="M50 14 V88"></path>
            <ellipse class="grid-line" cx="50" cy="51" rx="26" ry="36"></ellipse>
          `;

          const constellations = data.constellations
            .map((constellation) => {
              const isHighlight = constellation.name === data.highlight;
              const lines = constellation.lines
                .map((line) => (
                  `<line class="constellation-line" x1="${svgNumber(line.from.x)}" y1="${svgNumber(line.from.y)}" x2="${svgNumber(line.to.x)}" y2="${svgNumber(line.to.y)}"></line>`
                ))
                .join("");
              const stars = constellation.stars
                .map((star) => (
                  `<circle class="constellation-star" cx="${svgNumber(star.x)}" cy="${svgNumber(star.y)}" r="${svgNumber(star.size)}"></circle>`
                ))
                .join("");
              const label = showLabels
                ? `<text class="constellation-label" x="${svgNumber(constellation.x)}" y="${svgNumber(constellation.y - 6)}">${escapeHtml(constellationLabel(messages, constellation.name))}</text>`
                : "";
              return `
                <g class="constellation is-${escapeHtml(constellation.accent)}${isHighlight ? " is-highlight" : ""}">
                  ${lines}
                  ${stars}
                  ${label}
                </g>
              `;
            })
            .join("");

          svg.innerHTML = `${grid}${background}${constellations}`;
        }

        try {
          const payload = await waitForPayload({ timeoutMs: 500 });
          const { messages } = await loadLanguageJson(payload);
          const settings = mergeSettings(defaults, getSettings(payload), getQuerySettings());
          applyColorTheme(settings.color, { defaultTheme: defaults.color });

          const url = new URL("./api/data", window.location.href);
          url.searchParams.set("hemisphere", settings.hemisphere);
          url.searchParams.set("season", settings.season);
          url.searchParams.set("highlight", settings.highlight);
          url.searchParams.set("density", settings.density);

          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Sky data request failed with ${response.status}`);
          }

          const data = await response.json();
          const highlighted = data.constellations.find((item) => item.name === data.highlight);
          const highlightName = highlighted
            ? constellationLabel(messages, highlighted.name)
            : message(messages, "none", "None");

          document.querySelector("#kicker").textContent = message(messages, "kicker", "Constellations");
          document.querySelector("#title").textContent = message(messages, "title", "Sternbilder im Himmel");
          document.querySelector("#subtitle").textContent = message(messages, "subtitle", "Seasonal sky patterns for an eInk night map");
          document.querySelector("#highlightLabel").textContent = message(messages, "highlightLabel", "Highlighted");
          document.querySelector("#highlightName").textContent = highlightName;
          document.querySelector("#highlightNote").textContent = highlighted
            ? localizedNote(messages, highlighted.name, highlighted.note)
            : message(messages, "noHighlightNote", "No constellation is highlighted.");
          document.querySelector("#seasonLabel").textContent = message(messages, "seasonLabel", "Season");
          document.querySelector("#seasonValue").textContent =
            (messages.seasons && messages.seasons[data.season]) || seasonLabels[data.season] || data.season;
          document.querySelector("#hemisphereLabel").textContent = message(messages, "hemisphereLabel", "Sky");
          document.querySelector("#hemisphereValue").textContent =
            (messages.hemispheres && messages.hemispheres[data.hemisphere]) || hemisphereLabels[data.hemisphere] || data.hemisphere;
          document.querySelector("#legendText").textContent = message(messages, "legendText", "Highlight path");
          document.querySelector("#apiLabel").textContent = message(messages, "apiLabel", "API");
          document.querySelector("#apiValue").textContent = message(messages, "apiValue", data.source);

          renderSky({
            data,
            messages,
            showLabels: boolSetting(settings.showLabels),
            showMilkyWay: boolSetting(settings.showMilkyWay),
          });

          await document.fonts?.ready;
          fitAllText();
          fitToScreen(document.querySelector("#shell"));
          markReady();
        } catch (error) {
          markError(error);
        }
      })();
    </script>
  </body>
</html>
