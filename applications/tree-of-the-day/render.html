<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="paperless:epd-optimize"
      content='{"palette":"aitjcizeSpectra6Palette","imageAdjustmentOptions":{"toneMapping":{"exposure":0.04,"saturation":0.05,"contrast":0.03,"strength":0.35,"shadowBoost":0.05,"highlightCompress":0.08,"midpoint":0.5},"clarity":{"amount":0.9,"radius":2,"midtone":1.1},"dynamicRangeCompression":{"mode":"display","strength":0.55,"lowPercentile":0.01,"highPercentile":0.99}},"canvasDitherOptions":{"serpentine":true,"errorDiffusionMatrix":"sierra3"}}'
    />
    <title>Tree of the Day</title>
    <link rel="stylesheet" href="/assets/paperless.css" />
    <script src="/assets/paperless.iife.js"></script>
    <script src="./data/trees.js"></script>
    <style>
      .tree-screen {
        padding: 0;
        gap: 0;
      }

      .tree-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        grid-template-rows: auto minmax(0, 1fr);
        background: var(--pp-bg);
      }

      .hero-header {
        min-width: 0;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 18px 8px 20px;
      }

      .title-area {
        min-width: 0;
      }

      .label {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.68rem;
        line-height: 1.05;
        font-weight: 820;
        text-transform: uppercase;
      }

      .tree-name {
        margin: 4px 0 0;
        font-size: 3.4rem;
        line-height: 0.9;
        font-weight: 900;
        letter-spacing: 0;
        overflow-wrap: normal;
        word-break: normal;
        text-wrap: balance;
      }

      .nickname {
        margin: 7px 0 0;
        color: var(--pp-muted);
        font-size: 0.9rem;
        line-height: 1.12;
        font-weight: 760;
        overflow-wrap: anywhere;
      }

      .source-meta {
        flex: 0 0 118px;
        text-align: right;
        color: var(--pp-muted);
        font-size: 0.54rem;
        line-height: 1.12;
        font-weight: 780;
        text-transform: uppercase;
        overflow-wrap: anywhere;
      }

      .source-meta p {
        margin: 0;
      }

      .date-line {
        margin-bottom: 5px;
        color: var(--pp-fg);
        font-size: 0.72rem;
        font-weight: 850;
      }

      .image-stage {
        position: relative;
        grid-column: 2;
        grid-row: 1 / span 2;
        min-width: 0;
        min-height: 0;
        display: grid;
        place-items: center;
        padding: 14px 12px 18px 2px;
        background: #fff;
        overflow: hidden;
      }

      .tree-image {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center center;
        mix-blend-mode: multiply;
      }

      .info-panel {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        padding: 0 18px 16px 20px;
      }

      .signature-line {
        margin: 0 0 12px;
        font-size: 0.95rem;
        line-height: 1.14;
        font-weight: 780;
        overflow-wrap: anywhere;
      }

      .fact-grid {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-content: start;
        gap: 11px 15px;
      }

      .fact-grid[data-count="1"] {
        grid-template-columns: minmax(0, 1fr);
      }

      .fact {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow: hidden;
      }

      .value {
        margin: 0;
        font-size: 0.92rem;
        line-height: 1.07;
        font-weight: 850;
        overflow-wrap: anywhere;
      }

      @media (min-width: 1400px) and (min-height: 1000px) {
        .hero-header {
          padding: 20px 22px 9px 24px;
        }

        .nickname {
          font-size: 1rem;
        }

        .source-meta {
          flex-basis: 132px;
          font-size: 0.6rem;
        }

        .date-line {
          font-size: 0.8rem;
        }

        .info-panel {
          padding: 0 22px 18px 24px;
        }

        .signature-line {
          font-size: 1.08rem;
        }

        .fact-grid {
          gap: 13px 18px;
        }

        .value {
          font-size: 1.02rem;
        }
      }

      @media (orientation: portrait), (max-width: 700px) {
        .tree-shell {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: auto minmax(0, 1fr) auto;
        }

        .hero-header {
          padding: 15px 16px 6px;
          gap: 12px;
        }

        .tree-name {
          font-size: 3.15rem;
        }

        .nickname {
          font-size: 0.86rem;
        }

        .source-meta {
          flex-basis: 116px;
          font-size: 0.5rem;
        }

        .image-stage {
          grid-column: 1 / 2;
          grid-row: 2 / 3;
          padding: 4px 10px 12px;
        }

        .info-panel {
          grid-column: 1 / 2;
          grid-row: 3;
          display: block;
          padding: 8px 16px 14px;
        }

        .signature-line {
          margin-bottom: 10px;
          font-size: 0.86rem;
        }

        .fact-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px 18px;
        }

        .value {
          font-size: 0.9rem;
        }
      }

      @media (max-height: 560px) and (orientation: landscape) {
        .hero-header {
          padding: 12px 14px 5px 16px;
        }

        .tree-name {
          font-size: 2.65rem;
        }

        .nickname,
        .signature-line {
          font-size: 0.78rem;
        }

        .source-meta {
          flex-basis: 104px;
          font-size: 0.48rem;
        }

        .info-panel {
          padding: 0 14px 12px 16px;
        }

        .fact-grid {
          gap: 8px 12px;
        }

        .label {
          font-size: 0.58rem;
        }

        .value {
          font-size: 0.78rem;
          line-height: 1.04;
        }
      }
    </style>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main class="pp-screen tree-screen">
      <section class="tree-shell" id="app">
        <header class="hero-header">
          <div class="title-area">
            <p class="label" data-i18n="kicker">Tree of the day</p>
            <h1 class="tree-name pp-fit" id="tree-name" data-i18n="loading">
              Loading...
            </h1>
            <p class="nickname" id="nickname"></p>
          </div>
          <div class="source-meta">
            <p class="date-line" id="date">----</p>
            <p id="source"></p>
          </div>
        </header>

        <div class="image-stage">
          <img class="tree-image" id="tree-image" alt="" />
        </div>

        <section class="info-panel">
          <p class="signature-line pp-fit" id="signature"></p>
          <div class="fact-grid" id="facts"></div>
        </section>
      </section>
    </main>

    <script>
      (async function render() {
        const {
          waitForPayload,
          getSettings,
          getQuerySettings,
          mergeSettings,
          escapeHtml,
          fitText,
          fitHyphenatedText,
          fitToScreen,
          markLoading,
          markReady,
          markError,
          loadLanguageJson,
          applyColorTheme,
        } = window.PaperlessOpenIntegration;

        const trees = Array.isArray(window.TreeOfTheDayTrees)
          ? window.TreeOfTheDayTrees
          : [];

        const defaultMessages = {
          loading: "Loading...",
          kicker: "Tree of the day",
          species: "Species",
          range: "Range",
          height: "Height",
          age: "Age",
          leafType: "Leaf type",
          fruitSeed: "Fruit / seed",
          culturalRole: "Cultural role",
          family: "Family",
          habitat: "Habitat",
          conservation: "Conservation",
          category: "Entry",
          categorySpecies: "Species",
          categoryIndividual: "Famous tree",
          source: "Source",
          selectedFrom: "{count} in rotation",
          errorTitle: "Tree could not load",
        };
        let messages = defaultMessages;
        let currentLanguage = "en";

        function t(key, values = {}) {
          const template =
            typeof messages[key] === "string"
              ? messages[key]
              : defaultMessages[key] || key;
          return template.replace(
            /\{(\w+)\}/g,
            (_match, name) => values[name] ?? "",
          );
        }

        function applyStaticMessages(root = document) {
          root.querySelectorAll("[data-i18n]").forEach((element) => {
            element.textContent = t(element.dataset.i18n);
          });
        }

        async function loadMessages(payload) {
          let result;
          if (typeof loadLanguageJson === "function") {
            result = await loadLanguageJson(payload);
          } else {
            const requested = String(payload?.meta?.language || "en").trim();
            const requestedBase = requested.split("-")[0].toLowerCase();
            const supported = ["en", "de"];
            const language = supported.includes(requested)
              ? requested
              : supported.includes(requestedBase)
                ? requestedBase
                : "en";
            const response = await fetch(`./languages/${language}.json`, {
              cache: "no-store",
            });
            if (!response.ok) {
              throw new Error(
                `Could not load language JSON for ${language}: ${response.status}`,
              );
            }
            result = { language, messages: await response.json() };
          }

          messages = { ...defaultMessages, ...result.messages };
          currentLanguage = result.language || "en";
          document.documentElement.lang = currentLanguage;
          applyStaticMessages();
        }

        async function loadTreeTranslations(language) {
          const requested = String(language || "en")
            .trim()
            .toLowerCase();
          const requestedBase = requested.split("-")[0];
          const candidates = ["en", requestedBase, requested].filter(
            (value, index, array) => value && array.indexOf(value) === index,
          );
          let translations = {};

          for (const candidate of candidates) {
            try {
              const response = await fetch(
                `./languages/trees/${candidate}.json`,
                { cache: "no-store" },
              );
              if (!response.ok) {
                continue;
              }
              const data = await response.json();
              if (data && typeof data === "object" && !Array.isArray(data)) {
                translations = { ...translations, ...data };
              }
            } catch (_error) {
              // Item translations are optional; base data remains usable.
            }
          }

          return translations;
        }

        function applyTreeTranslation(tree, translations) {
          const translation =
            translations && typeof translations === "object"
              ? translations[tree.id]
              : null;
          if (
            !translation ||
            typeof translation !== "object" ||
            Array.isArray(translation)
          ) {
            return tree;
          }

          const fields = [
            "name",
            "nickname",
            "species",
            "family",
            "nativeRange",
            "height",
            "age",
            "leafType",
            "fruitSeed",
            "habitat",
            "conservation",
            "culturalRole",
            "signature",
            "source",
          ];
          const translatedFields = {};
          fields.forEach((field) => {
            if (typeof translation[field] === "string") {
              translatedFields[field] = translation[field];
            }
          });
          return { ...tree, ...translatedFields };
        }

        function dayKey(date = new Date()) {
          return date.toISOString().slice(0, 10);
        }

        function hashString(value) {
          let hash = 2166136261;
          for (let index = 0; index < value.length; index += 1) {
            hash ^= value.charCodeAt(index);
            hash = Math.imul(hash, 16777619);
          }
          return hash >>> 0;
        }

        function pickTree(settings, key) {
          const pinned = String(settings.treeId || "")
            .trim()
            .toLowerCase();
          if (pinned) {
            const match = trees.find((tree) => tree.id === pinned);
            if (match) {
              return { tree: match, poolSize: 1 };
            }
          }

          const region = String(settings.region || "any");
          const category = String(settings.category || "any");
          const pool = trees.filter((tree) => {
            const regionMatch = region === "any" || tree.region === region;
            const categoryMatch =
              category === "any" || tree.category === category;
            return regionMatch && categoryMatch;
          });
          const fallbackPool = pool.length ? pool : trees;
          const seed = String(settings.seed || "");
          const index =
            hashString(`${key}|${seed}|${region}|${category}`) %
            fallbackPool.length;
          return { tree: fallbackPool[index], poolSize: fallbackPool.length };
        }

        function formatDate(value) {
          const date = new Date(`${value}T00:00:00Z`);
          return date.toLocaleDateString(currentLanguage || undefined, {
            day: "2-digit",
            month: "short",
            timeZone: "UTC",
          });
        }

        function fact(label, value) {
          return `
            <article class="fact">
              <p class="label">${escapeHtml(label)}</p>
              <p class="value">${escapeHtml(value || "N/A")}</p>
            </article>
          `;
        }

        function categoryLabel(value) {
          return value === "individual"
            ? t("categoryIndividual")
            : t("categorySpecies");
        }

        function waitForImage(image) {
          if (image.complete && image.naturalWidth > 0) {
            return Promise.resolve();
          }
          return new Promise((resolve, reject) => {
            image.addEventListener("load", resolve, { once: true });
            image.addEventListener(
              "error",
              () => reject(new Error(t("imageFailed"))),
              { once: true },
            );
          });
        }

        async function renderPayload(payload) {
        try {
          markLoading();
          const defaults = {
            color: "light",
            region: "any",
            category: "any",
            treeId: "",
            seed: "",
            showSpecies: true,
            showRange: true,
            showHeight: true,
            showAge: true,
            showLeafType: true,
            showFruitSeed: true,
            showCulturalRole: true,
            showFamily: false,
            showHabitat: false,
            showConservation: false,
            showCategory: false,
          };
          await loadMessages(payload);
          const settings = mergeSettings(
            defaults,
            getSettings(payload),
            getQuerySettings(),
          );
          if (typeof applyColorTheme === "function") {
            applyColorTheme(settings.color, { defaultTheme: defaults.color });
          }
          if (!trees.length) {
            throw new Error(t("listFailed"));
          }

          const today = dayKey();
          const { tree: selectedTree } = pickTree(settings, today);
          const treeTranslations = await loadTreeTranslations(currentLanguage);
          const tree = applyTreeTranslation(selectedTree, treeTranslations);
          const image = document.getElementById("tree-image");
          image.src = tree.image;
          image.alt = tree.name;

          document.getElementById("date").textContent = formatDate(today);
          document.getElementById("source").textContent = tree.source;
          document.getElementById("tree-name").innerHTML = escapeHtml(
            tree.name,
          );
          document.getElementById("nickname").innerHTML = escapeHtml(
            tree.nickname,
          );
          document.getElementById("signature").innerHTML = escapeHtml(
            tree.signature,
          );

          const availableFacts = [
            { setting: "showSpecies", label: t("species"), value: tree.species },
            {
              setting: "showRange",
              label: t("range"),
              value: tree.nativeRange,
            },
            { setting: "showHeight", label: t("height"), value: tree.height },
            { setting: "showAge", label: t("age"), value: tree.age },
            {
              setting: "showLeafType",
              label: t("leafType"),
              value: tree.leafType,
            },
            {
              setting: "showFruitSeed",
              label: t("fruitSeed"),
              value: tree.fruitSeed,
            },
            {
              setting: "showCulturalRole",
              label: t("culturalRole"),
              value: tree.culturalRole,
            },
            { setting: "showFamily", label: t("family"), value: tree.family },
            { setting: "showHabitat", label: t("habitat"), value: tree.habitat },
            {
              setting: "showConservation",
              label: t("conservation"),
              value: tree.conservation,
            },
            {
              setting: "showCategory",
              label: t("category"),
              value: categoryLabel(tree.category),
            },
          ];
          const selectedFacts = availableFacts.filter(
            (item) => settings[item.setting] !== false,
          );
          const visibleFacts = selectedFacts.length
            ? selectedFacts
            : availableFacts.slice(0, 7);
          const factsElement = document.getElementById("facts");
          factsElement.dataset.count = String(
            Math.min(visibleFacts.length, 11),
          );
          factsElement.innerHTML = visibleFacts
            .map((item) => fact(item.label, item.value))
            .join("");

          await Promise.all([document.fonts?.ready, waitForImage(image)]);
          const compactLandscape =
            window.innerWidth > window.innerHeight && window.innerHeight <= 560;
          const roomyLandscape =
            window.innerWidth >= 1400 && window.innerHeight >= 1000;
          fitText(document.getElementById("tree-name"), {
            min: 28,
            max: compactLandscape ? 52 : roomyLandscape ? 86 : 70,
            step: 2,
            tolerance: 6,
            lineBreak: "balance",
          });
          fitHyphenatedText(document.getElementById("signature"), {
            min: 10,
            max: compactLandscape ? 14 : roomyLandscape ? 21 : 18,
            step: 1,
            lineBreak: true,
          });
          fitToScreen();
          markReady({ tree: tree.id, day: today });
        } catch (error) {
          markError(error);
          document.body.innerHTML = `<main class="pp-screen"><h1 class="pp-title pp-error">${escapeHtml(t("errorTitle"))}</h1><p>${escapeHtml(error.message)}</p></main>`;
        }
        }

        const payload = await waitForPayload({ timeoutMs: 500, onUpdate: renderPayload });
        await renderPayload(payload);
      })();
    </script>
  </body>
</html>
