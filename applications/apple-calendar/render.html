<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="paperless:epd-optimize" content='{"intent":"readable"}' />
    <title>Apple Calendar</title>
    <link rel="stylesheet" href="/assets/paperless.css" />
    <script src="/assets/paperless.iife.js"></script>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main id="app" aria-live="polite"></main>
    <script type="module">
      const { bootCalendarApiIntegration } = window.PaperlessOpenIntegration;
      const defaults = {
        color: "light",
        title: "Apple Calendar",
        calendarUrl: "",
        view: "agenda",
        locale: "de-DE",
        timeZone: "Europe/Berlin",
        dayRange: 14,
        maxEvents: 30,
        highlightToday: false,
        highlightScale: 1.35,
        showLocation: true,
        showEventIcons: false,
        showEventImages: false,
        sampleData: false,
        now: "",
      };

      function text(value, fallback = "") {
        return typeof value === "string" && value.trim() ? value.trim() : fallback;
      }

      await bootCalendarApiIntegration({
        defaults,
        fallbackTitle: "Apple Calendar",
        buildRequest({ mergedSettings, range, settings }) {
          return {
            calendarUrl: mergedSettings.calendarUrl,
            rangeStart: range.startKey,
            rangeEndExclusive: range.endKey,
            timeZone: settings.timeZone,
            limit: 500,
            sampleData: mergedSettings.sampleData,
            now: mergedSettings.now,
          };
        },
        resolveHeader({ data, mergedSettings, messages }) {
          return {
            kicker: data.sample
              ? text(messages.sampleSource, "Sample data")
              : text(messages.kicker, "iCloud public calendar"),
            title: text(mergedSettings.title, "Apple Calendar"),
            subtitle: text(data.calendarName),
            source: text(messages.source, "Apple Calendar"),
          };
        },
      });
    </script>
  </body>
</html>
