<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duden Wort des Tages</title>
    <link rel="stylesheet" href="/assets/paperless.css" />
    <script src="/assets/paperless.iife.js"></script>
    <style>
      :root {
        --duden-yellow: #ffd008;
        --duden-ink: #171717;
        --duden-muted: #555;
      }

      .duden-screen {
        background: #fff;
        color: var(--duden-ink);
        gap: 18px;
        padding: 28px;
      }

      .duden-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 6px solid var(--duden-yellow);
        padding-bottom: 14px;
      }

      .duden-brand {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .duden-logo {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        background: var(--duden-yellow);
        border: 4px solid var(--duden-ink);
        font-size: 42px;
        font-weight: 900;
        line-height: 1;
      }

      .duden-kicker {
        margin: 0 0 4px;
        font-size: 1.2rem;
        line-height: 1;
        font-weight: 800;
        text-transform: uppercase;
      }

      .duden-word {
        margin: 0;
        max-width: 100%;
        font-size: 5.6rem;
        line-height: 0.95;
        font-weight: 850;
        overflow-wrap: anywhere;
      }

      .duden-date {
        flex: 0 0 auto;
        margin: 0;
        max-width: 12ch;
        color: var(--duden-muted);
        font-size: 1.05rem;
        line-height: 1.1;
        text-align: right;
      }

      .duden-main {
        display: grid;
        grid-template-rows: minmax(0, 1.35fr) minmax(0, 1fr);
        gap: 18px;
        flex: 1;
        min-height: 0;
      }

      .duden-meaning {
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border-left: 10px solid var(--duden-yellow);
        padding: 8px 0 8px 22px;
      }

      .duden-label {
        margin: 0 0 8px;
        color: var(--duden-muted);
        font-size: 1.05rem;
        line-height: 1;
        font-weight: 850;
        text-transform: uppercase;
      }

      .duden-definition {
        margin: 0;
        white-space: pre-line;
        font-size: 3.6rem;
        line-height: 1.04;
        font-weight: 760;
      }

      .duden-details {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        min-height: 0;
      }

      .duden-card {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 3px solid var(--duden-ink);
        padding: 14px;
        overflow: hidden;
      }

      .duden-card:nth-child(4) {
        background: var(--duden-yellow);
      }

      .duden-value {
        margin: 0;
        font-size: 1.7rem;
        line-height: 1.08;
        font-weight: 760;
        overflow-wrap: anywhere;
      }

      .duden-frequency {
        font-size: 2rem;
        letter-spacing: 0;
        white-space: nowrap;
      }

      @media (orientation: portrait) {
        .duden-screen {
          padding: 24px;
          gap: 18px;
        }

        .duden-header {
          align-items: flex-start;
        }

        .duden-logo {
          width: 58px;
          height: 58px;
          font-size: 38px;
        }

        .duden-word {
          font-size: 4.9rem;
        }

        .duden-main {
          grid-template-rows: minmax(0, 1fr) minmax(0, 1.4fr);
        }

        .duden-definition {
          font-size: 3.1rem;
        }

        .duden-details {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .duden-card {
          padding: 12px 14px;
        }
      }

      @media (max-width: 700px), (max-height: 560px) {
        .duden-screen {
          padding: 18px;
          gap: 12px;
        }

        .duden-header {
          gap: 10px;
          padding-bottom: 10px;
          border-bottom-width: 5px;
        }

        .duden-logo {
          width: 48px;
          height: 48px;
          border-width: 3px;
          font-size: 31px;
        }

        .duden-kicker {
          font-size: 0.88rem;
        }

        .duden-word {
          font-size: 3.4rem;
        }

        .duden-date {
          font-size: 0.78rem;
        }

        .duden-main {
          gap: 12px;
        }

        .duden-meaning {
          border-left-width: 7px;
          padding-left: 14px;
        }

        .duden-label {
          font-size: 0.82rem;
          margin-bottom: 6px;
        }

        .duden-definition {
          font-size: 2.05rem;
        }

        .duden-details {
          gap: 8px;
        }

        .duden-card {
          border-width: 2px;
          padding: 9px;
        }

        .duden-value {
          font-size: 1.05rem;
        }

        .duden-frequency {
          font-size: 1.35rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main class="pp-screen duden-screen">
      <header class="duden-header">
        <div class="duden-brand">
          <div class="duden-logo" aria-hidden="true">D</div>
          <div>
            <p class="duden-kicker" data-i18n="kicker">Wort des Tages</p>
            <h1 class="duden-word pp-fit" id="word">...</h1>
          </div>
        </div>
        <p class="duden-date" id="updated"></p>
      </header>

      <section class="duden-main">
        <article class="duden-meaning">
          <p class="duden-label" data-i18n="meaning">Bedeutung</p>
          <p class="duden-definition pp-fit" id="meaning" data-i18n="loading">Wird geladen...</p>
        </article>

        <section class="duden-details" id="details"></section>
      </section>
    </main>

    <script>
      (async function render() {
        const {
          waitForPayload,
          getSettings,
          getQuerySettings,
          mergeSettings,
          escapeHtml,
          fitAllText,
          fitHyphenatedText,
          fitToScreen,
          markReady,
          markError,
        } = window.PaperlessOpenIntegration;

        const defaultMessages = {
          "loading": "Loading...",
          "updated": "Updated",
          "from": "from",
          "errorTitle": "Duden could not load",
          "apiFailed": "API failed with {status}",
          "kicker": "Word of the Day",
          "meaning": "Meaning",
          "usage": "Usage",
          "type": "Type",
          "origin": "Origin",
          "frequency": "Frequency",
          "notAvailable": "N/A"
};
        let messages = defaultMessages;
        let currentLanguage = "en";

        function t(key, values = {}) {
          const template =
            typeof messages[key] === "string"
              ? messages[key]
              : defaultMessages[key] || key;
          return template.replace(/\{(\w+)\}/g, (_match, name) =>
            values[name] ?? "",
          );
        }

        function applyStaticMessages(root = document) {
          root.querySelectorAll("[data-i18n]").forEach((element) => {
            element.textContent = t(element.dataset.i18n);
          });
        }

        async function loadMessages(payload) {
          const loader = window.PaperlessOpenIntegration.loadLanguageJson;
          let result;

          if (typeof loader === "function") {
            result = await loader(payload);
          } else {
            const requested = String(payload?.meta?.language || "en").trim();
            const requestedBase = requested.split("-")[0].toLowerCase();
            const supported = ["en", "de", "fr", "es", "it"];
            const language = supported.includes(requested)
              ? requested
              : supported.includes(requestedBase)
                ? requestedBase
                : "en";
            const response = await fetch(`./languages/${language}.json`, {
              cache: "no-store",
            });

            if (!response.ok) {
              throw new Error(
                `Could not load language JSON for ${language}: ${response.status}`,
              );
            }

            result = {
              language,
              messages: await response.json(),
            };
          }

          messages = { ...defaultMessages, ...result.messages };
          currentLanguage = result.language || "en";
          document.documentElement.lang = currentLanguage;
          applyStaticMessages();
          return result;
        }

        function detailLabels() {
          return [
            [t("usage"), "usage"],
            [t("type"), "type"],
            [t("origin"), "origin"],
            [t("frequency"), "frequency"],
          ];
        }

        try {
          const payload = await waitForPayload({ timeout: 300 });
          await loadMessages(payload);
          const settings = mergeSettings(
            { wordPath: '' },
            getSettings(payload),
            getQuerySettings(),
          );
          const params = new URLSearchParams(settings);
          const response = await fetch(`./api/data?${params.toString()}`, {
            cache: 'no-store',
          });

          if (!response.ok) {
            throw new Error(`Duden API failed with ${response.status}`);
          }

          const data = await response.json();

          document.getElementById('word').innerHTML = escapeHtml(data.word);
          document.getElementById('meaning').innerHTML = escapeHtml(data.meaning);
          document.getElementById('updated').textContent = new Date(data.updatedAt).toLocaleDateString(currentLanguage || 'en', {
            day: '2-digit',
            month: '2-digit',
          });
          document.getElementById('details').innerHTML = detailLabels()
            .map(([label, key]) => `
              <article class="duden-card">
                <p class="duden-label">${label}</p>
                <p class="duden-value pp-fit ${key === 'frequency' ? 'duden-frequency' : ''}">${escapeHtml(data[key] || t("notAvailable"))}</p>
              </article>
            `)
            .join('');

          fitHyphenatedText(document.getElementById('word'), {
            min: 30,
            max: 110,
            step: 2,
            tolerance: 8,
            lineBreak: 'balance',
          });
          fitHyphenatedText(document.getElementById('meaning'), {
            min: 18,
            max: 74,
            step: 2,
            tolerance: 12,
            lineBreak: 'balance',
            fitParent: document.querySelector('.duden-meaning'),
          });
          fitAllText('.duden-card .pp-fit', { min: 12, max: 34, step: 1, tolerance: 4, lineBreak: true });
          fitToScreen();
          markReady({ word: data.word });
        } catch (error) {
          markError(error);
          document.body.innerHTML = `<main class="pp-screen"><h1 class="pp-title pp-error">${escapeHtml(t("errorTitle"))}</h1><p>${escapeHtml(error.message)}</p></main>`;
        }
      })();
    </script>
  </body>
</html>
