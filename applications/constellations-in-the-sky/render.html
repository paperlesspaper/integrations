<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="paperless:epd-optimize" content='{"intent":"vivid"}'>
    <title>Constellations in the Sky</title>
    <link rel="stylesheet" href="/assets/paperless.css">
    <script src="/assets/paperless.iife.js"></script>
    <script src="./assets/virtualsky/stuquery.min.js"></script>
    <script src="./assets/virtualsky/virtualsky.min.js"></script>
    <script src="./assets/virtualsky/virtualsky-planets.js"></script>
    <style>
      .stars-screen {
        padding: 0;
        gap: 0;
      }

      .stars-shell {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 226px;
        border: 4px solid currentColor;
      }

      .sky-stage {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: var(--pp-bg);
        color: var(--pp-fg);
      }

      #virtualSky,
      #virtualSky canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      #virtualSky canvas {
        image-rendering: pixelated;
      }

      #virtualSky .virtualskybutton,
      #virtualSky [class$="_btn_help"],
      #virtualSky [class$="_credit"],
      #virtualSky [class$="_help"],
      #virtualSky [class$="_clock"],
      #virtualSky [class$="_position"],
      #virtualSky [class$="_projection"] {
        display: none !important;
      }

      .stars-panel {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 12px;
        padding: 18px 16px 14px;
        border-left: 4px solid currentColor;
        background: var(--pp-card);
        overflow: hidden;
      }

      .kicker,
      .meta,
      .fact-label,
      .legend-text,
      .api-label {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.78rem;
        line-height: 1.05;
        font-weight: 850;
        text-transform: uppercase;
      }

      .stars-title {
        margin: 6px 0 0;
        color: var(--pp-accent);
        font-size: 2.35rem;
        line-height: 0.9;
        font-weight: 950;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .stars-subtitle {
        margin: 8px 0 0;
        font-size: 1rem;
        line-height: 1.12;
        font-weight: 800;
      }

      .highlight-block {
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 9px;
        padding: 14px 0;
        border-top: 3px solid currentColor;
        border-bottom: 3px solid currentColor;
      }

      .highlight-name {
        margin: 0;
        font-size: 1.82rem;
        line-height: 0.98;
        font-weight: 940;
        overflow-wrap: anywhere;
      }

      .highlight-note {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.88rem;
        line-height: 1.16;
        font-weight: 720;
      }

      .fact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .fact {
        min-width: 0;
        padding: 9px;
        border: 2px solid currentColor;
      }

      .fact-value {
        margin: 4px 0 0;
        font-size: 1.05rem;
        line-height: 1.05;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .legend-mark {
        width: 22px;
        height: 8px;
        flex: 0 0 auto;
        background: #f7cf28;
        border: 2px solid currentColor;
      }

      .api-note {
        display: grid;
        gap: 3px;
      }

      .api-value {
        margin: 0;
        font-size: 0.82rem;
        line-height: 1.08;
        font-weight: 800;
      }

      @media (orientation: portrait), (max-width: 700px) {
        .stars-shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) auto;
        }

        .stars-panel {
          grid-template-rows: auto auto;
          grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
          gap: 10px 14px;
          padding: 14px;
          border-left: 0;
          border-top: 4px solid currentColor;
        }

        .highlight-block {
          padding: 0 0 0 12px;
          border-top: 0;
          border-bottom: 0;
          border-left: 3px solid currentColor;
        }

        .stars-title {
          font-size: 1.9rem;
        }

        .stars-subtitle {
          font-size: 0.9rem;
        }

        .highlight-name {
          font-size: 1.45rem;
        }

        .highlight-note {
          display: none;
        }

        .daily-sign-mode .highlight-note {
          display: block;
          font-size: 0.78rem;
          line-height: 1.12;
        }

        .footer-stack {
          grid-column: 1 / -1;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          align-items: end;
        }
      }

      @media (max-width: 520px), (max-height: 520px) {
        .stars-shell {
          border-width: 3px;
        }

        .stars-panel {
          gap: 8px;
          padding: 10px;
        }

        .stars-title {
          font-size: 1.55rem;
        }

        .highlight-name {
          font-size: 1.22rem;
        }

        .fact {
          padding: 7px;
        }

        .fact-value {
          font-size: 0.92rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main class="pp-screen stars-screen" id="screen">
      <section class="stars-shell" id="shell">
        <div class="sky-stage" id="skyStage">
          <div id="virtualSky" aria-label="Astronomical sky map"></div>
        </div>
        <aside class="stars-panel">
          <header>
            <p class="kicker" id="kicker">Constellations</p>
            <h1 class="stars-title pp-fit" id="title">Constellations in the Sky</h1>
            <p class="stars-subtitle" id="subtitle">Loading sky map...</p>
          </header>
          <section class="highlight-block">
            <p class="fact-label" id="viewLabel">View</p>
            <h2 class="highlight-name pp-fit" id="viewValue">-</h2>
            <p class="highlight-note" id="viewNote"></p>
          </section>
          <footer class="footer-stack">
            <div class="fact-grid">
              <div class="fact">
                <p class="fact-label" id="locationLabel">Location</p>
                <p class="fact-value" id="locationValue">-</p>
              </div>
              <div class="fact">
                <p class="fact-label" id="timeLabel">Time</p>
                <p class="fact-value" id="timeValue">-</p>
              </div>
            </div>
            <div class="api-note">
              <div class="legend">
                <span class="legend-mark"></span>
                <p class="legend-text" id="legendText">Constellation lines</p>
              </div>
              <p class="api-label" id="apiLabel">Engine</p>
              <p class="api-value" id="apiValue">VirtualSky local catalogue</p>
            </div>
          </footer>
        </aside>
      </section>
    </main>
    <script>
      (async function render() {
        const {
          waitForPayload,
          getSettings,
          getQuerySettings,
          mergeSettings,
          loadLanguageJson,
          applyColorTheme,
          fitAllText,
          fitToScreen,
          markReady,
          markError,
        } = window.PaperlessOpenIntegration;

        const defaults = {
          color: "dark",
          displayMode: "sky",
          dailySignSeed: "",
          latitude: 52.52,
          longitude: 13.405,
          timeMode: "tonight",
          customDate: "",
          customTime: "22:00",
          projection: "stereo",
          direction: 180,
          magnitude: 5.5,
          starSize: 1,
          showLabels: true,
          showMilkyWay: true,
          showBoundaries: false,
          showGrid: false,
          showPlanets: false,
        };

        const projectionLabels = {
          gnomic: "Focused",
          stereo: "Stereographic",
          polar: "All sky",
          lambert: "Lambert",
          ortho: "Orthographic",
          mollweide: "Mollweide",
          planechart: "Plane chart",
        };

        const zodiacSigns = [
          {
            key: "Ari",
            name: "Aries",
            ra: 42,
            dec: 20,
            note: "Aries is a small northern zodiac constellation. Its modest pattern sits between Pisces and Taurus and marks the Ram in the traditional zodiac."
          },
          {
            key: "Tau",
            name: "Taurus",
            ra: 68,
            dec: 18,
            note: "Taurus is one of the richest zodiac constellations, with Aldebaran, the Hyades, and the Pleiades all nearby."
          },
          {
            key: "Gem",
            name: "Gemini",
            ra: 105,
            dec: 24,
            note: "Gemini is anchored by Castor and Pollux, the twin stars that make this winter constellation easy to recognize."
          },
          {
            key: "Cnc",
            name: "Cancer",
            ra: 130,
            dec: 20,
            note: "Cancer is faint, but it contains the Beehive Cluster, a bright open cluster visible under dark skies."
          },
          {
            key: "Leo",
            name: "Leo",
            ra: 153,
            dec: 13,
            note: "Leo is marked by Regulus and a sickle-shaped head. It is one of spring's most recognizable zodiac constellations."
          },
          {
            key: "Vir",
            name: "Virgo",
            ra: 195,
            dec: -4,
            note: "Virgo is the largest zodiac constellation. Its bright star Spica sits near the ecliptic path of the Moon and planets."
          },
          {
            key: "Lib",
            name: "Libra",
            ra: 230,
            dec: -15,
            note: "Libra represents the scales. Its main stars form a compact shape between Virgo and Scorpius."
          },
          {
            key: "Sco",
            name: "Scorpius",
            ra: 247,
            dec: -26,
            note: "Scorpius is a dramatic zodiac constellation with the red star Antares and a long curved tail."
          },
          {
            key: "Sgr",
            name: "Sagittarius",
            ra: 285,
            dec: -25,
            note: "Sagittarius lies toward the center of the Milky Way. Its teapot-shaped star pattern is a useful summer guide."
          },
          {
            key: "Cap",
            name: "Capricornus",
            ra: 315,
            dec: -18,
            note: "Capricornus is a faint but ancient zodiac constellation, often drawn as a sea-goat in classical sky lore."
          },
          {
            key: "Aqr",
            name: "Aquarius",
            ra: 335,
            dec: -10,
            note: "Aquarius covers a broad, mostly faint region of the zodiac and is associated with the Water Bearer."
          },
          {
            key: "Psc",
            name: "Pisces",
            ra: 15,
            dec: 10,
            note: "Pisces is a large, faint constellation of two fish joined by a cord, stretching across the autumn sky."
          }
        ];

        function message(messages, key, fallback) {
          return typeof messages[key] === "string" ? messages[key] : fallback;
        }

        function boolSetting(value) {
          return value === true || value === "true" || value === "1";
        }

        function numberSetting(value, fallback, min, max) {
          const number = Number(value);
          if (!Number.isFinite(number)) {
            return fallback;
          }
          return Math.min(Math.max(number, min), max);
        }

        function oneOf(value, allowed, fallback) {
          return allowed.includes(value) ? value : fallback;
        }

        function cssVariable(name) {
          return getComputedStyle(document.body).getPropertyValue(name).trim();
        }

        function formatCoordinate(value, positiveSuffix, negativeSuffix) {
          const absolute = Math.abs(value).toFixed(2);
          return `${absolute}${value < 0 ? negativeSuffix : positiveSuffix}`;
        }

        function formatDateTime(date) {
          return new Intl.DateTimeFormat(undefined, {
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          }).format(date);
        }

        function timeFromSettings(settings) {
          const mode = oneOf(settings.timeMode, ["now", "tonight", "custom"], defaults.timeMode);
          if (mode === "now") {
            return new Date();
          }

          const timeMatch = String(settings.customTime || defaults.customTime).match(/^(\d{1,2}):(\d{2})$/);
          const hours = timeMatch ? Math.min(Number(timeMatch[1]), 23) : 22;
          const minutes = timeMatch ? Math.min(Number(timeMatch[2]), 59) : 0;
          const date = mode === "custom" && /^\d{4}-\d{2}-\d{2}$/.test(settings.customDate || "")
            ? new Date(`${settings.customDate}T00:00:00`)
            : new Date();

          date.setHours(hours, minutes, 0, 0);
          return date;
        }

        function dayOfYear(date) {
          const start = new Date(date.getFullYear(), 0, 0);
          return Math.floor((date - start) / 86400000);
        }

        function hashText(text) {
          let hash = 2166136261;
          for (let index = 0; index < text.length; index += 1) {
            hash ^= text.charCodeAt(index);
            hash = Math.imul(hash, 16777619);
          }
          return hash >>> 0;
        }

        function dailySignForDate(date, seed) {
          const normalizedSeed = String(seed || "").trim();
          const seedOffset = normalizedSeed ? hashText(normalizedSeed) : 0;
          return zodiacSigns[(dayOfYear(date) + seedOffset) % zodiacSigns.length];
        }

        function localizedSign(messages, sign) {
          const signs = messages.zodiacSigns && typeof messages.zodiacSigns === "object"
            ? messages.zodiacSigns
            : {};
          return typeof signs[sign.key] === "string" ? signs[sign.key] : sign.name;
        }

        function localizedSignNote(messages, sign) {
          const notes = messages.zodiacNotes && typeof messages.zodiacNotes === "object"
            ? messages.zodiacNotes
            : {};
          return typeof notes[sign.key] === "string" ? notes[sign.key] : sign.note;
        }

        function filterConstellationLines(lines, sign) {
          if (!sign || !Array.isArray(lines)) {
            return lines;
          }
          return lines.filter((line) => line[0] === sign.key);
        }

        function filterConstellationBoundaries(boundaries, sign) {
          if (!sign || !Array.isArray(boundaries)) {
            return boundaries;
          }
          return boundaries.filter((boundary) => boundary[0] === sign.key);
        }

        async function loadJson(path) {
          const response = await fetch(path);
          if (!response.ok) {
            throw new Error(`Could not load ${path}: ${response.status}`);
          }
          return response.json();
        }

        function applyVirtualSkyPalette(sky) {
          const foreground = cssVariable("--pp-fg") || "rgb(255,255,255)";
          const muted = cssVariable("--pp-muted") || foreground;
          const accent = cssVariable("--pp-accent") || foreground;
          sky.col.txt = foreground;
          sky.col.stars = foreground;
          sky.col.cardinal = foreground;
          sky.col.constellation = accent;
          sky.col.constellationboundary = muted;
          sky.col.galaxy = "rgba(94,179,255,0.72)";
          sky.col.az = "rgba(255,255,255,0.28)";
          sky.col.eq = "rgba(247,207,40,0.32)";
          sky.col.gal = "rgba(94,179,255,0.32)";
          sky.col.grey = muted;
          sky.col.sun = "#f7cf28";
          sky.col.moon = foreground;
        }

        function addDeepStars(sky, stars) {
          if (!stars || !Array.isArray(stars.stars)) {
            return;
          }

          sky.stars = sky.stars.concat(sky.convertStarsToRadians(stars.stars));
          sky.starsdeep = true;
          sky.lookup.star = sky.stars.map((star) => ({
            ra: star[2],
            dec: star[3],
            label: star[0],
            mag: star[1],
          }));
        }

        function renderInfo({ messages, settings, skyTime, projection, displayMode, dailySign }) {
          const latitude = numberSetting(settings.latitude, defaults.latitude, -90, 90);
          const longitude = numberSetting(settings.longitude, defaults.longitude, -180, 180);
          const direction = numberSetting(settings.direction, defaults.direction, 0, 359);
          const magnitude = numberSetting(settings.magnitude, defaults.magnitude, 1, 6.5);
          const starSize = numberSetting(settings.starSize, defaults.starSize, 0.4, 3);
          const mode = oneOf(settings.timeMode, ["now", "tonight", "custom"], defaults.timeMode);

          document.querySelector("#kicker").textContent = message(messages, "kicker", "Constellations");
          document.querySelector("#title").textContent = message(messages, "title", "Constellations in the Sky");
          document.querySelector("#subtitle").textContent = displayMode === "dailySign"
            ? message(messages, "dailySubtitle", "One zodiac constellation for today")
            : message(messages, "subtitle", "Location-aware sky map from real star positions");
          document.querySelector("#viewLabel").textContent = displayMode === "dailySign"
            ? message(messages, "dailySignLabel", "Today's sign")
            : message(messages, "viewLabel", "View");
          const localizedProjection = messages.projections && typeof messages.projections[projection] === "string"
            ? messages.projections[projection]
            : projectionLabels[projection] || projection;
          document.querySelector("#viewValue").textContent = displayMode === "dailySign" && dailySign
            ? localizedSign(messages, dailySign)
            : `${localizedProjection} ${Math.round(direction)}°`;
          document.querySelector("#viewNote").textContent = displayMode === "dailySign" && dailySign
            ? localizedSignNote(messages, dailySign)
            : message(
                messages,
                "viewNote",
                `Stars to magnitude ${magnitude.toFixed(1)} with constellation lines from VirtualSky.`
              );
          document.querySelector("#locationLabel").textContent = message(messages, "locationLabel", "Location");
          document.querySelector("#locationValue").textContent =
            `${formatCoordinate(latitude, "N", "S")} ${formatCoordinate(longitude, "E", "W")}`;
          document.querySelector("#timeLabel").textContent = message(messages, "timeLabel", "Time");
          document.querySelector("#timeValue").textContent =
            mode === "now" ? message(messages, "now", "Now") : formatDateTime(skyTime);
          document.querySelector("#legendText").textContent = displayMode === "dailySign"
            ? message(messages, "dailyLegendText", "Today's constellation")
            : message(messages, "legendText", "Constellation lines");
          document.querySelector("#apiLabel").textContent = message(messages, "apiLabel", "Engine");
          document.querySelector("#apiValue").textContent = message(messages, "apiValue", "VirtualSky local catalogue");
        }

        try {
          const payload = await waitForPayload({ timeoutMs: 500 });
          const { messages } = await loadLanguageJson(payload);
          const settings = mergeSettings(defaults, getSettings(payload), getQuerySettings());
          applyColorTheme(settings.color, { defaultTheme: defaults.color });

          if (!window.S || typeof window.S.virtualsky !== "function") {
            throw new Error("VirtualSky failed to load.");
          }

          const latitude = numberSetting(settings.latitude, defaults.latitude, -90, 90);
          const longitude = numberSetting(settings.longitude, defaults.longitude, -180, 180);
          const direction = numberSetting(settings.direction, defaults.direction, 0, 359);
          const magnitude = numberSetting(settings.magnitude, defaults.magnitude, 1, 6.5);
          const starSize = numberSetting(settings.starSize, defaults.starSize, 0.4, 3);
          const displayMode = oneOf(settings.displayMode, ["sky", "dailySign"], defaults.displayMode);
          document.body.classList.toggle("daily-sign-mode", displayMode === "dailySign");
          const configuredProjection = oneOf(
            settings.projection,
            ["stereo", "polar", "lambert", "ortho", "mollweide", "planechart"],
            defaults.projection
          );
          const projection = displayMode === "dailySign" ? "gnomic" : configuredProjection;
          const skyTime = timeFromSettings(settings);
          const dailySign = displayMode === "dailySign"
            ? dailySignForDate(skyTime, settings.dailySignSeed)
            : null;

          const [lines, boundaries, galaxy, stars] = await Promise.all([
            loadJson("./assets/virtualsky/lines_latin.json"),
            loadJson("./assets/virtualsky/boundaries.json"),
            loadJson("./assets/virtualsky/galaxy.json"),
            loadJson("./assets/virtualsky/stars.json"),
          ]);

          renderInfo({ messages, settings, skyTime, projection, displayMode, dailySign });

          const stage = document.querySelector("#skyStage");
          const sky = window.S.virtualsky({
            id: "virtualSky",
            projection,
            latitude,
            longitude,
            clock: skyTime,
            az: direction,
            ra: dailySign ? dailySign.ra : undefined,
            dec: dailySign ? dailySign.dec : undefined,
            fov: dailySign ? 52 : undefined,
            magnitude,
            scalestars: starSize,
            constellations: true,
            constellationlabels: boolSetting(settings.showLabels),
            constellationboundaries: dailySign ? true : boolSetting(settings.showBoundaries),
            constellationwidth: dailySign ? 2.2 : 1.35,
            constellationboundarieswidth: 0.8,
            lines: filterConstellationLines(lines.lines, dailySign),
            boundaries: filterConstellationBoundaries(boundaries.boundaries, dailySign),
            showgalaxy: dailySign ? false : boolSetting(settings.showMilkyWay),
            galaxy: galaxy.galaxy,
            galaxywidth: 1.15,
            showstars: true,
            showstarlabels: false,
            showplanets: boolSetting(settings.showPlanets),
            showplanetlabels: boolSetting(settings.showPlanets),
            showdate: false,
            showposition: false,
            cardinalpoints: true,
            gridlines_az: boolSetting(settings.showGrid),
            gridlines_eq: false,
            gridlines_gal: false,
            gridstep: 30,
            gridlineswidth: 0.7,
            gradient: false,
            ground: displayMode !== "dailySign",
            transparent: true,
            keyboard: false,
            mouse: false,
            credit: false,
            lang: payload.meta?.language === "de" ? "de" : "en",
            width: Math.max(1, stage.clientWidth),
            height: Math.max(1, stage.clientHeight),
          });

          addDeepStars(sky, stars);
          applyVirtualSkyPalette(sky);
          sky.resize(Math.max(1, stage.clientWidth), Math.max(1, stage.clientHeight));
          sky.draw();

          await document.fonts?.ready;
          fitAllText();
          fitToScreen(document.querySelector("#shell"));
          sky.resize(Math.max(1, stage.clientWidth), Math.max(1, stage.clientHeight));
          sky.draw();
          await new Promise((resolve) => window.requestAnimationFrame(resolve));
          markReady();
        } catch (error) {
          markError(error);
        }
      })();
    </script>
  </body>
</html>
