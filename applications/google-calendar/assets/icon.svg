      <path d="M78 136h324" stroke="#2d5fbf" stroke-opacity=".45" stroke-width="1"/>
    </g>
  </g>
  <text x="240" y="240" fill="#4c85ed" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="700" text-anchor="middle">G</text>
  <text x="240" y="369" fill="#2f3b4a" font-family="Arial, Helvetica, sans-serif" font-size="152" font-weight="500" text-anchor="middle">31</text>
