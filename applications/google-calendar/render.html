<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="paperless:epd-optimize" content='{"intent":"readable"}' />
    <title>Google Calendar</title>
    <link rel="stylesheet" href="/assets/paperless.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@7.11.0/css/iconoir.css" />
    <script src="/assets/paperless.iife.js"></script>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main id="app" aria-live="polite"></main>

    <script type="module">
      const {
        applyColorTheme,
        buildCalendarRange,
        fitCalendarLayout,
        getQuerySettings,
        getSettings,
        loadLanguageJson,
        markError,
        markLoading,
        markReady,
        mergeSettings,
        normalizeCalendarSettings,
        renderCalendarLayout,
        waitForCalendarImages,
        waitForPayload,
      } = window.PaperlessOpenIntegration;

      const app = document.querySelector("#app");
      const defaults = {
        color: "light",
        view: "agenda",
        locale: "de-DE",
        timeZone: "Europe/Berlin",
        dayRange: 3,
        maxEvents: 50,
        highlightToday: false,
        highlightScale: 1.35,
        showLocation: true,
        showEventIcons: true,
        showEventImages: false,
        sampleData: false,
        now: "",
      };
      const iconAliases = {
        appointment: "calendar",
        birthday: "birthday-cake",
        briefcase: "suitcase",
        call: "phone",
        dentist: "healthcare",
        doctor: "healthcare",
        flight: "airplane",
        focus: "star",
        health: "healthcare",
        holiday: "airplane",
        medical: "healthcare",
        meeting: "group",
        office: "suitcase",
        plane: "airplane",
        reminder: "warning-triangle",
        school: "open-book",
        shopping: "shopping-bag",
        travel: "airplane",
        trip: "airplane",
        vacation: "beach-bag",
        video: "video-camera",
        work: "suitcase",
      };
      let currentEvents = [];
      let hasCalendarPayload = false;
      let renderRequest = 0;

      function isRecord(value) {
        return Boolean(value) && typeof value === "object" && !Array.isArray(value);
      }

      function booleanValue(value, fallback = false) {
        if (value === undefined || value === null || value === "") return fallback;
        if (typeof value === "string") {
          return !["false", "0", "off", "no"].includes(value.toLowerCase());
        }
        return Boolean(value);
      }

      function extractEvents(payload) {
        if (Array.isArray(payload)) return payload;
        if (!isRecord(payload)) return null;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload.events)) return payload.events;
        if (isRecord(payload.calendarData) && Array.isArray(payload.calendarData.events)) {
          return payload.calendarData.events;
        }
        if (isRecord(payload.meta)) {
          const calendarData = payload.meta.calendarData;
          if (isRecord(calendarData) && Array.isArray(calendarData.events)) {
            return calendarData.events;
          }
        }
        return null;
      }

      function normalizeIconName(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 48);
      }

      function extractIconTokens(value, metadata) {
        return String(value || "").replace(/\[icon:([^\]\n]+)\]/gi, (_match, name) => {
          const iconName = normalizeIconName(name);
          if (iconName && !metadata.iconName) metadata.iconName = iconName;
          return "";
        });
      }

      function cleanText(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function safeImageUrl(value, requireImageLike = false) {
        const decoded = document.createElement("textarea");
        decoded.innerHTML = String(value || "");
        try {
          const url = new URL(decoded.value.trim(), window.location.href);
          if (!["http:", "https:"].includes(url.protocol)) return "";
          if (requireImageLike && !/\.(avif|gif|jpe?g|png|svg|webp)$/i.test(url.pathname)) {
            return "";
          }
          return url.href;
        } catch {
          return "";
        }
      }

      function descriptionImage(description) {
        const raw = String(description || "");
        if (!raw.trim()) return "";
        const template = document.createElement("template");
        template.innerHTML = raw;
        const candidates = [
          ...Array.from(template.content.querySelectorAll("img[src]"), (node) => [node.getAttribute("src"), false]),
          ...Array.from(template.content.querySelectorAll("a[href]"), (node) => [node.getAttribute("href"), true]),
          ...Array.from(raw.replace(/<[^>]*>/g, " ").matchAll(/https?:\/\/[^\s<>"')]+/gi), (match) => [match[0], true]),
        ];
        for (const [candidate, imageLike] of candidates) {
          const safe = safeImageUrl(candidate, imageLike);
          if (safe) return safe;
        }
        return "";
      }

      function mapGoogleEvent(event, messages) {
        if (
          !isRecord(event) ||
          !isRecord(event.start) ||
          String(event.status || "").toLowerCase() === "cancelled"
        ) return null;
        const metadata = { iconName: "" };
        const rawTitle = extractIconTokens(event.summary || messages.untitled, metadata);
        const description = extractIconTokens(event.description || "", metadata);
        return {
          id: event.id,
          title: cleanText(rawTitle) || messages.untitled,
          start: {
            date: event.start.date,
            dateTime: event.start.dateTime,
            timeZone: event.start.timeZone,
          },
          end: isRecord(event.end)
            ? { date: event.end.date, dateTime: event.end.dateTime, timeZone: event.end.timeZone }
            : undefined,
          location: event.location,
          iconName: metadata.iconName,
          imageUrl: descriptionImage(description),
        };
      }

      function addDays(dateKey, amount) {
        const date = new Date(`${dateKey}T12:00:00Z`);
        date.setUTCDate(date.getUTCDate() + amount);
        return date.toISOString().slice(0, 10);
      }

      function dateTimeParts(value, timeZone) {
        return Object.fromEntries(
          new Intl.DateTimeFormat("en-US", {
            timeZone,
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hourCycle: "h23",
          })
            .formatToParts(value)
            .filter((part) => part.type !== "literal")
            .map((part) => [part.type, Number(part.value)]),
        );
      }

      function zonedDateTime(dateKey, time, timeZone) {
        const [year, month, day] = dateKey.split("-").map(Number);
        const [hour, minute] = time.split(":").map(Number);
        const wallClock = Date.UTC(year, month - 1, day, hour, minute);
        let candidate = wallClock;
        for (let attempt = 0; attempt < 6; attempt += 1) {
          const parts = dateTimeParts(new Date(candidate), timeZone);
          const represented = Date.UTC(
            parts.year,
            parts.month - 1,
            parts.day,
            parts.hour,
            parts.minute,
            parts.second,
          );
          const correction = wallClock - represented;
          if (!correction) break;
          candidate += correction;
        }
        return new Date(candidate).toISOString();
      }

      function buildSampleEvents(now, settings) {
        const startKey = buildCalendarRange({ ...settings, view: "agenda" }, now).startKey;
        const timed = (id, title, dayOffset, start, end, location) => ({
          id,
          summary: title,
          location,
          start: {
            dateTime: zonedDateTime(addDays(startKey, dayOffset), start, settings.timeZone),
            timeZone: settings.timeZone,
          },
          end: {
            dateTime: zonedDateTime(addDays(startKey, dayOffset), end, settings.timeZone),
            timeZone: settings.timeZone,
          },
        });
        return [
          timed("sample-standup", "[icon:meeting] Team stand-up", 0, "09:30", "10:00", "Studio 2"),
          timed("sample-planning", "[icon:work] Sprint planning", 0, "14:00", "15:30", "Project room"),
          {
            id: "sample-focus",
            summary: "[icon:focus] Focus day",
            start: { date: addDays(startKey, 1) },
            end: { date: addDays(startKey, 2) },
          },
          timed("sample-review", "[icon:briefcase] Project review", 2, "11:00", "12:00", "Online"),
          timed("sample-retro", "Retrospective", 7, "15:30", "16:15", "Studio 2"),
          timed("sample-dentist", "[icon:medical] Dentist", 31, "08:15", "09:00", "Health centre"),
        ];
      }

      function showError(error, messages) {
        app.innerHTML = "";
        const section = document.createElement("section");
        section.className = "pp-error";
        const title = document.createElement("h1");
        title.textContent = messages.errorTitle || "Google Calendar could not load";
        const detail = document.createElement("p");
        detail.textContent = error instanceof Error ? error.message : String(error);
        section.append(title, detail);
        app.append(section);
        markError(error);
      }

      async function renderPayload(payload) {
        const request = ++renderRequest;
        let messages = {};
        try {
          markLoading();
          const language = await loadLanguageJson(payload);
          if (request !== renderRequest) return;
          messages = language.messages;
          document.documentElement.lang = language.language || "en";
          const overrides = mergeSettings(getSettings(payload), getQuerySettings());
          const rawSettings = mergeSettings(defaults, overrides);
          const settings = normalizeCalendarSettings(overrides, defaults);
          const now = rawSettings.now || undefined;
          applyColorTheme(rawSettings.color, { defaultTheme: defaults.color });

          const payloadEvents = extractEvents(payload);
          if (payloadEvents) {
            currentEvents = payloadEvents;
            hasCalendarPayload = true;
          }
          const sourceEvents = booleanValue(rawSettings.sampleData)
            ? buildSampleEvents(now || new Date(), settings)
            : hasCalendarPayload
              ? currentEvents
              : [];
          const events = sourceEvents
            .map((event) => mapGoogleEvent(event, messages))
            .filter(Boolean);
          const layout = renderCalendarLayout({
            target: app,
            events,
            settings,
            messages,
            now,
            iconAliases,
          });
          await document.fonts?.ready;
          await waitForCalendarImages(layout);
          if (request !== renderRequest) return;
          fitCalendarLayout(layout);
          markReady();
        } catch (error) {
          if (request !== renderRequest) return;
          showError(error, messages);
        }
      }

      const payload = await waitForPayload({ timeoutMs: 500, fallback: {}, onUpdate: renderPayload });
      await renderPayload(payload);
    </script>
  </body>
</html>
