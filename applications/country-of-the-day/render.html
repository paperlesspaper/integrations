<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="paperless:epd-optimize" content='{"intent":"readable"}'>
    <title>Country of the Day</title>
    <link rel="stylesheet" href="/assets/paperless.css">
    <script src="/assets/paperless.iife.js"></script>
    <style>
      .country-screen {
        padding: 0;
        gap: 0;
      }

      .country-shell {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.45fr);
        min-height: 0;
        border: 3px solid currentColor;
      }

      .hero {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        padding: 22px;
        border-right: 3px solid currentColor;
        background: var(--pp-card);
      }

      .kicker-row,
      .footer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .kicker,
      .meta,
      .label {
        margin: 0;
        color: var(--pp-muted);
        font-size: 0.86rem;
        line-height: 1.05;
        font-weight: 820;
        text-transform: uppercase;
      }

      .date-pill {
        flex: 0 0 auto;
        padding: 7px 10px;
        border: 2px solid currentColor;
        font-size: 0.82rem;
        line-height: 1;
        font-weight: 850;
      }

      .flag-stage {
        min-height: 0;
        display: grid;
        place-items: center;
      }

      .flag {
        font-size: 9.8rem;
        line-height: 1;
      }

      .country-code {
        margin: 0;
        font-size: 2.4rem;
        line-height: 0.9;
        font-weight: 900;
        letter-spacing: 0;
      }

      .content {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
      }

      .title-block {
        min-width: 0;
        padding: 22px 24px 18px;
        border-bottom: 3px solid currentColor;
      }

      .country-name {
        margin: 4px 0 0;
        font-size: 4.5rem;
        line-height: 0.92;
        font-weight: 900;
        overflow-wrap: normal;
        word-break: normal;
        text-wrap: balance;
      }

      .official-name {
        margin: 10px 0 0;
        color: var(--pp-muted);
        font-size: 1.15rem;
        line-height: 1.14;
        font-weight: 740;
        overflow-wrap: anywhere;
      }

      .fact-grid {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
      }

      .fact {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 7px;
        padding: 15px 18px;
        border-right: 3px solid currentColor;
        border-bottom: 3px solid currentColor;
        overflow: hidden;
      }

      .fact:nth-child(2n) {
        border-right: 0;
      }

      .fact:nth-last-child(-n + 2) {
        border-bottom: 0;
      }

      .fact:nth-child(3) {
        background: #f7cf28;
        color: #171717;
      }

      .fact:nth-child(4) {
        background: #e83d35;
        color: #fff;
      }

      .value {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.05;
        font-weight: 850;
        overflow-wrap: anywhere;
      }

      .status-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-top: 3px solid currentColor;
      }

      .status {
        min-width: 0;
        padding: 11px 14px;
        border-right: 3px solid currentColor;
      }

      .status:last-child {
        border-right: 0;
      }

      .status-value {
        margin: 3px 0 0;
        font-size: 1.02rem;
        line-height: 1.08;
        font-weight: 820;
        overflow-wrap: anywhere;
      }

      @media (min-width: 1400px) and (min-height: 1000px) {
        .country-shell {
          grid-template-columns: minmax(360px, 0.72fr) minmax(0, 1.55fr);
        }

        .hero {
          padding: 34px 28px;
        }

        .kicker,
        .meta,
        .label {
          font-size: 0.95rem;
        }

        .date-pill {
          font-size: 0.92rem;
        }

        .flag {
          font-size: 15rem;
        }

        .country-code {
          font-size: 3.4rem;
        }

        .title-block {
          padding: 26px 28px 20px;
        }

        .official-name {
          font-size: 1.35rem;
        }

        .fact {
          padding: 18px 22px;
        }

        .value {
          font-size: 1.78rem;
        }

        .status {
          padding: 13px 16px;
        }

        .status-value {
          font-size: 1.12rem;
        }
      }

      @media (orientation: portrait), (max-width: 700px) {
        .country-shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .hero {
          grid-template-columns: minmax(0, 1fr) auto;
          grid-template-rows: auto auto;
          gap: 8px 16px;
          align-items: center;
          padding: 16px;
          border-right: 0;
          border-bottom: 3px solid currentColor;
        }

        .flag-stage {
          grid-row: 1 / 3;
          grid-column: 2;
        }

        .flag {
          font-size: 5.7rem;
        }

        .footer-row {
          justify-content: flex-start;
        }

        .country-code {
          font-size: 2rem;
        }

        .title-block {
          padding: 16px;
        }

        .country-name {
          font-size: 3.35rem;
        }

        .official-name {
          font-size: 0.98rem;
        }

        .fact-grid {
          grid-template-columns: 1fr;
        }

        .fact {
          padding: 11px 14px;
          border-right: 0;
          border-bottom: 3px solid currentColor;
        }

        .fact:nth-last-child(-n + 2) {
          border-bottom: 3px solid currentColor;
        }

        .fact:last-child {
          border-bottom: 0;
        }

        .value {
          font-size: 1.18rem;
        }

        .status-strip {
          grid-template-columns: 1fr;
        }

        .status {
          padding: 8px 12px;
          border-right: 0;
          border-bottom: 3px solid currentColor;
        }

        .status:last-child {
          border-bottom: 0;
        }

        .status-value {
          font-size: 0.92rem;
        }
      }

      @media (max-height: 560px) and (orientation: landscape) {
        .hero,
        .title-block {
          padding: 16px;
        }

        .flag {
          font-size: 7.4rem;
        }

        .country-name {
          font-size: 3.4rem;
        }

        .official-name {
          font-size: 0.94rem;
          margin-top: 6px;
        }

        .fact {
          padding: 10px 13px;
          gap: 4px;
        }

        .value {
          font-size: 1.14rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="website-has-loading-element"></div>
    <main class="pp-screen country-screen">
      <section class="country-shell" id="app">
        <section class="hero">
          <div class="kicker-row">
            <p class="kicker" data-i18n="kicker">Country of the day</p>
            <p class="date-pill" id="date">----</p>
          </div>
          <div class="flag-stage">
            <div class="flag" id="flag" aria-hidden="true">?</div>
          </div>
          <div class="footer-row">
            <p class="country-code" id="country-code">---</p>
            <p class="meta" id="pool">Loading...</p>
          </div>
        </section>

        <section class="content">
          <header class="title-block">
            <p class="label" id="region-label">Region</p>
            <h1 class="country-name pp-fit" id="country-name" data-i18n="loading">Loading...</h1>
            <p class="official-name pp-fit" id="official-name"></p>
          </header>

          <section class="fact-grid" id="facts"></section>

          <footer class="status-strip" id="status"></footer>
        </section>
      </section>
    </main>

    <script>
      (async function render() {
        const {
          waitForPayload,
          getSettings,
          getQuerySettings,
          mergeSettings,
          escapeHtml,
          fitText,
          fitHyphenatedText,
          fitToScreen,
          markLoading,
          markReady,
          markError,
          loadLanguageJson,
          applyColorTheme,
        } = window.PaperlessOpenIntegration;

        const defaultMessages = {
          loading: 'Loading...',
          kicker: 'Country of the day',
          region: 'Region',
          capital: 'Capital',
          area: 'Area',
          languages: 'Languages',
          currency: 'Currency',
          borders: 'Borders',
          coordinates: 'Coordinates',
          callingCode: 'Calling code',
          unMember: 'UN member',
          independent: 'Independent',
          geography: 'Geography',
          landlocked: 'Landlocked',
          coastline: 'Coastline',
          yes: 'Yes',
          no: 'No',
          noBorders: 'No land borders',
          more: '+{count}',
          selectedFrom: '{count} in rotation',
          source: 'Data',
          errorTitle: 'Country could not load',
          apiFailed: 'API failed with {status}',
        };
        let messages = defaultMessages;
        let currentLanguage = 'en';

        function t(key, values = {}) {
          const template =
            typeof messages[key] === 'string'
              ? messages[key]
              : defaultMessages[key] || key;
          return template.replace(/\{(\w+)\}/g, (_match, name) => values[name] ?? '');
        }

        function applyStaticMessages(root = document) {
          root.querySelectorAll('[data-i18n]').forEach((element) => {
            element.textContent = t(element.dataset.i18n);
          });
        }

        async function loadMessages(payload) {
          let result;
          if (typeof loadLanguageJson === 'function') {
            result = await loadLanguageJson(payload);
          } else {
            const requested = String(payload?.meta?.language || 'en').trim();
            const requestedBase = requested.split('-')[0].toLowerCase();
            const supported = ['en', 'de', 'fr', 'es', 'it'];
            const language = supported.includes(requested)
              ? requested
              : supported.includes(requestedBase)
                ? requestedBase
                : 'en';
            const response = await fetch(`./languages/${language}.json`, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`Could not load language JSON for ${language}: ${response.status}`);
            }
            result = { language, messages: await response.json() };
          }

          messages = { ...defaultMessages, ...result.messages };
          currentLanguage = result.language || 'en';
          document.documentElement.lang = currentLanguage;
          applyStaticMessages();
        }

        function formatDate(value) {
          const date = new Date(`${value}T00:00:00Z`);
          return date.toLocaleDateString(currentLanguage || undefined, {
            day: '2-digit',
            month: 'short',
            timeZone: 'UTC',
          });
        }

        function formatArea(value) {
          const number = Number(value);
          if (!Number.isFinite(number) || number <= 0) {
            return 'N/A';
          }
          return `${new Intl.NumberFormat(currentLanguage || undefined).format(Math.round(number))} km2`;
        }

        function listValue(values, fallback = 'N/A') {
          return Array.isArray(values) && values.length ? values.join(', ') : fallback;
        }

        function compactListValue(values, max, fallback = 'N/A') {
          if (!Array.isArray(values) || !values.length) {
            return fallback;
          }

          const visible = values.slice(0, max);
          const hidden = values.length - visible.length;
          return hidden > 0
            ? `${visible.join(', ')} ${t('more', { count: hidden })}`
            : visible.join(', ');
        }

        function coordsValue(values) {
          if (!Array.isArray(values) || values.length < 2) {
            return 'N/A';
          }
          const [lat, lng] = values;
          return `${Number(lat).toFixed(1)}, ${Number(lng).toFixed(1)}`;
        }

        function fact(label, value) {
          return `
            <article class="fact">
              <p class="label">${escapeHtml(label)}</p>
              <p class="value">${escapeHtml(value || 'N/A')}</p>
            </article>
          `;
        }

        function status(label, value) {
          return `
            <div class="status">
              <p class="label">${escapeHtml(label)}</p>
              <p class="status-value">${escapeHtml(value || 'N/A')}</p>
            </div>
          `;
        }

        async function renderPayload(payload) {
          try {
            markLoading?.();
            const defaults = {
              color: 'light',
              region: 'any',
              independentOnly: true,
              countryCode: '',
              seed: '',
            };
            await loadMessages(payload);
            const settings = mergeSettings(defaults, getSettings(payload), getQuerySettings());
            if (typeof applyColorTheme === 'function') {
              applyColorTheme(settings.color, { defaultTheme: defaults.color });
            }

            const params = new URLSearchParams(settings);
            params.set('language', currentLanguage);
            const response = await fetch(`./api/data?${params.toString()}`, { cache: 'no-store' });

            if (!response.ok) {
              throw new Error(t('apiFailed', { status: response.status }));
            }

            const country = await response.json();
            document.getElementById('date').textContent = formatDate(country.dayKey);
            document.getElementById('flag').textContent = country.flag || country.cca2 || '?';
            document.getElementById('country-code').textContent = country.cca3 || country.cca2 || '---';
            document.getElementById('pool').textContent = t('selectedFrom', { count: country.poolSize });
            document.getElementById('region-label').textContent = country.region || t('region');
            document.getElementById('country-name').innerHTML = escapeHtml(country.name);
            document.getElementById('official-name').innerHTML = escapeHtml(
              country.nativeName && country.nativeName !== country.name
                ? `${country.officialName} / ${country.nativeName}`
                : country.officialName,
            );

            document.getElementById('facts').innerHTML = [
              fact(t('capital'), country.capital),
              fact(t('area'), formatArea(country.area)),
              fact(t('languages'), compactListValue(country.languages, 3)),
              fact(t('currency'), compactListValue(country.currencies, 2)),
              fact(t('borders'), compactListValue(country.borders, 2, t('noBorders'))),
              fact(t('coordinates'), coordsValue(country.latlng)),
            ].join('');

            document.getElementById('status').innerHTML = [
              status(t('geography'), country.landlocked ? t('landlocked') : t('coastline')),
              status(t('unMember'), country.unMember ? t('yes') : t('no')),
              status(t('source'), country.source),
            ].join('');

            const compactLandscape =
              window.innerWidth > window.innerHeight && window.innerHeight <= 560;
            const roomyLandscape =
              window.innerWidth >= 1400 && window.innerHeight >= 1000;
            fitText(document.getElementById('country-name'), {
              min: 26,
              max: compactLandscape ? 60 : roomyLandscape ? 108 : 82,
              step: 2,
              tolerance: 8,
              lineBreak: 'balance',
            });
            fitHyphenatedText(document.getElementById('official-name'), {
              min: 12,
              max: compactLandscape ? 18 : roomyLandscape ? 28 : 22,
              step: 1,
              lineBreak: true,
            });
            fitToScreen();
            markReady({ country: country.cca3, day: country.dayKey });
          } catch (error) {
            markError(error);
            document.body.innerHTML = `<main class="pp-screen"><h1 class="pp-title pp-error">${escapeHtml(t('errorTitle'))}</h1><p>${escapeHtml(error.message)}</p></main>`;
          }
        }

        const payload = await waitForPayload({ timeout: 300, onUpdate: renderPayload });
        await renderPayload(payload);
      })();
    </script>
  </body>
</html>
